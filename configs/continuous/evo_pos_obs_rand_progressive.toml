[algo.FromConfig.Evolutionary]
nn_layers = [15, 64, 3]
population_size = 100
elite_count = 2
mutation_rate = 0.5
mutation_strength = 1.0
mutation_strength_decay = 0.995
min_mutation_strength = 0.1
max_strength_to_freeze = 0.2

[env.Plane]
width = 10.0
height = 10.0
n_rays = 11
length_ray = 2.0
ray_span = 1.57 # In radians
reward_type = "Additive"

agent_pos = { RandomBorder = { n = 1 } }
goal_pos = { RandomBorder = { n = 1 } }
obstacles_config = { RandomInside = { n = 3, max_distance = 1.0 } }



[training]
epochs = 1000
max_steps_per_epoch = 1000
regenerate_every = 10
update_graphics_every = 50


[action.SolutionVisualization]
saving_path = "./assets/"
create_video = true
plots = [
    [
        "Evolutionary algorithm on continuous environment",
        [
            ["Reward", 1.0],
            ["Mutation strength", 0.5]
        ],
        true
    ],
]
