[algo.FromConfig.Evolutionary]
nn_layers = [4, 16, 3]
population_size = 100
elite_count = 2
mutation_rate = 0.5
mutation_strength = 1.0
mutation_strength_decay = 0.99
min_mutation_strength = 0.1
max_strength_to_freeze = 0.2


[env.Plane]
width = 10.0
height = 10.0
n_rays = 0
length_ray = 2.0
ray_span = 1.57 # In radians
reward_type = "Additive"

agent_pos = { Fixed = { pos = [
    [0.0, 0.0],
] } }
goal_pos = { Fixed = { pos = [
    [9.0, 9.0],
] } }
obstacles_config = { Fixed = { pos = [
    # [4.0, 4.0],
] } }

# agent_pos = { RandomBorder = { n = 2 } }
# goal_pos = { RandomBorder = { n = 2 } }
# obstacles_config = { RandomInside = { n = 3, max_distance = 1.0 } }



[training]
epochs = 500
max_steps_per_epoch = 1000
regenerate_every = 5
update_graphics_every = 50


[action.SolutionVisualization]
saving_path = "./assets/"
create_video = true
plots = [
    [
        "Evolutionary algorithm on continuous environment",
        [
            ["Reward", 1.0],
            ["Mutation strength", 0.4],
        ],
        true
    ],
    [
        "Evolutionary algorithm on continuous environment",
        [
            ["Reward", 1.0]
        ],
        true
    ]
]
