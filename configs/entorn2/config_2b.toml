[algo.Load]
path = "assets/model_ppo.json"
# new_dim = [7, 64, 3]


[env.Plane]
width = 10.0
height = 10.0
n_rays = 5
length_ray = 2.0
ray_span = 1.57 # In radians
reward_type = "Additive"

# agent_pos = { RandomBorder = { n = 2 } }
# goal_pos = { RandomBorder = { n = 2 } }
# obstacles_config = { RandomInside = { n = 3, max_distance = 1.0 } }
agent_pos = { Fixed = { pos = [
    [0.0, 0.0],
] } }
goal_pos = { Fixed = { pos = [
    [9.0 ,0.0],
] } }
obstacles_config = { Fixed = { pos = [
    # [5.0, 6.0],
] } }

[training]
epochs = 0
max_steps_per_epoch = 1000
regenerate_every = 100
update_graphics_every = 10


[action.SolutionVisualization]
saving_path = "./assets/"
create_video = true
plots = [
    [
        "Evolutionary algorithm on plane",
        [
            ["Reward", 1.0],
            ["Epsilon", 0.4],
        ],
        true
    ],
