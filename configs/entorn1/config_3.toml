[algo.FromConfig]
type = "tabular_q_learning"

min_e = 0.1
decay_rate_e = 0.99
learning_rate = 0.2
reward_discount_factor = 0.99
max_steps_per_epoch = 250


[env]
width = 10
height = 10

start_x = 0
start_y = 0

goal_x = 9
goal_y = 9

reward_type = "Flat"


[training]
epochs = 2000


[action.CheckHyperparametersEffect]
saving_path = "./assets/"
learning_rates = [1e-3, 0.1, 0.5, 0.9]
reward_discount_factors = [0.1, 0.5, 0.9, 0.99]
epsilon_decays = [0.5, 0.9, 0.99, 0.999]
